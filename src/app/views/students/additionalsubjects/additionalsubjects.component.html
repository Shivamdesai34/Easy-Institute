<div>
    <h2>Apply for Additional Courses</h2>
    <hr>
</div>

<div class="app-body">
    <main class="main d-flex align-items-center">
        <div class="container">
            <c-row>
                <c-col [md]="8" class="mx-auto">

                    <c-card class="mx-4">
                        <c-card-body class="p-4">
                            <form [formGroup]="additionalSubjectsForm" (ngSubmit)="addSubjectsPayment()">
                                <div class="form-group col-sm-12">
                                    <label size="sm" cLabel class="required"><b>Batch</b></label>
                                    <select cSelect class="form-control modal-validation"
                                            [(ngModel)]="BatchObject"
                                            [ngClass]="{ 'is-invalid': (submitted || f['batch'].touched) &&
                                            f['batch'].errors,
                                            'is-valid': f['batch'].touched && !f['batch'].errors }"
                                            (change)="PortalOpen()" formControlName="batch">
                                        <option value="" disabled selected>--- Please Select ---</option>
                                        <option *ngFor="let data of modalBatch; let i = index" [ngValue]="data">
                                            {{ data.Batch_name }}
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-sm-12">
                                    <label size="sm" cLabel class="required"><b>Subject Group</b></label>
                                    <select cSelect formControlName="batchSubjects"
                                            [(ngModel)]="selectedObject" [ngClass]="{ 'is-invalid': (submitted || f['batchSubjects'].touched) && f['batchSubjects'].errors,
                                            'is-valid': f['batchSubjects'].touched && !f['batchSubjects'].errors }"
                                            (change)="onGroupSelected()"
                                            class="form-control modal-validation">
                                        <option value="" disabled selected>--- Please Select ---</option>
                                        <option *ngFor="let data of batchSubjects; let i = index" [ngValue]="data">
                                            {{ data.Subject_group_code }}
                                        </option>
                                    </select>
                                </div>

                                <c-col [sm]="12" class="form-group">
                                    <p><b size="sm">Selected Subject Code Consists : </b>
                                        <br> {{ selectedObject?.Subject_group_name }}</p>
                                </c-col>

                                <c-col [sm]="12" class="form-group">
                                    <h3 size="sm"> Form Amount : ₹ {{ BatchObject?.Formamount }} </h3>
                                </c-col>

                                <div class="form-group" style="float:right">
                                    <button cButton type="submit" [disabled]="additionalSubjectsForm.invalid"
                                            class="btn btn-outline-dark btn-sm">Pay
                                    </button>
                                </div>
                            </form>
                        </c-card-body>
                    </c-card>


                </c-col>
            </c-row>
        </div>
    </main>
</div>

<div class="col-lg-12">

    <div style="padding-left: 18px;">
        <h4>Courses Already Applied.</h4>
    </div>
    <div class="card-body">
        <table class="table table-responsive table-striped">
            <thead>
            <tr>
                <th size="sm">Batch Name</th>
                <th size="sm">Subject Group Name</th>
                <th size="sm">Receipt Amount</th>
            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let data of AppliedCourses; let i = index">
                <td size="sm">{{ data.Batch_name }}</td>
                <td size="sm">{{ data.Subject_group_name }}</td>
                <td size="sm">{{ data.Receiptamount }}</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
