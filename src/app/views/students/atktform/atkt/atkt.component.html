<form cForm
      [formGroup]="Atktformstudent"
      (keydown.enter)="$event.preventDefault()"
      class="mb-5"
>
    
    <c-row>
        <c-col [md]="6">
            <label size="sm" cLabel for="out_batch">Batch:</label>
            <div style="width: 100%;">
                <select sizing="sm" cSelect [(ngModel)]="selected_batchstudent"
                        id="out_batch"
                        formControlName="out_batch"
                        class="form-control"
                        (change)="onSelect_batch()"
                >
                    <option disabled selected>--Select batch--</option>
                    @for (studentbatch of atkt_student_batch; track studentbatch) {
                        <option
                                [ngValue]="studentbatch">
                            {{ studentbatch.Batch_name }}
                        </option>
                    }
                </select>
            </div>
        
        </c-col>
        
        <c-col [md]="2">
            <label size="sm" cLabel for="out_semester">Semester:</label>
            <select cSelect sizing="sm"
                    id="out_semester"
                    [(ngModel)]="selected_semester"
                    formControlName="out_semester"
                    class="form-control"
                    (change)="onSelect_semester()"
            >
                <option disabled selected>--Select Semester Exam--</option>
                @for (user of json_semester_batchwise; track user) {
                    <option [ngValue]="user">
                        {{ user }}
                    </option>
                }
                @if (Atktformstudent.get('out_semester')?.invalid &&
                Atktformstudent.get('out_semester')?.touched) {
                    <span
                            class="text-danger"
                            size="sm"
                    >Semester is required</span>
                }
            </select>
        </c-col>
        
        <c-col [sm]="2">
            <label size="sm" cLabel for="mobileno" class="required">Whatsapp no</label>
            <input sizing="sm" cFormControl
                   id="mobileno"
                   type="text"
                   maxlength="10"
                   formControlName="mobileno"
                   class="form-control capitalize"
                   placeholder="Enter your Whatsapp no"
            />
        
        </c-col>
        
        <c-col>
            <button cButton class="btn-add btn-success text-white atktformbtn" id="showsubject"
                    [disabled]="Atktformstudent.invalid"
                    type="submit" (click)="ShowAtkt()">
                @if (finalloader) {
                    <c-spinner aria-hidden="false" size="sm"></c-spinner>
                }
                Show
            </button>
        </c-col>
    
    </c-row>
    
    <div class="my-3"></div>
    
    <ag-grid-angular
            style="width: 100%; height: 400px;" class="ag-theme-alpine"
            [rowData]="atkt_subject_papers"
            [gridOptions]="gridOptions_details"
            [columnDefs]="subject_details"
            [rowSelection]='rowSelection_document_atkt'
            [defaultColDef]="defaultColDef"
            [pagination]="true"
            (gridReady)="onGridReady_subject_selected($event)"
            (rowSelected)="onRowSelected_subject($event)"
            (selectionChanged)="onSelectionChanged_subject($event)"
    >
    </ag-grid-angular>
    
    
    
    <p><h4 style="color: red" size="sm" class="atktform-notes">
    Note: You have selected the following subjects and total count
    :{{ this.AselectedRows?.length }}</h4>
    
    <ag-grid-angular
            style="width: 100%; height: 400px;" class="ag-theme-alpine"
            [rowData]="this.AselectedRows"
            [gridOptions]="gridOptions_details_subjects"
            [columnDefs]="subject_details_subjects"
            (gridReady)="onGridReady_subject_details_selected($event)"
            (selectionChanged)="onSelectionChanged_subject($event)"
    >
    </ag-grid-angular>

    <c-row>
        <p><h4 size="sm">Total {{ sumamount }}</h4>
